services:
  groupchat-app:
    build:
      context: ./apps/backend
    container_name: vcp-groupchat-app
    ports:
      - "7010:7010"
    env_file:
      - path: ./apps/backend/config.env
        required: false
    environment:
      PORT: 7010
      FRONTEND_STATIC_DIR: /usr/src/frontend
      VCP_CORE_URL: ${VCP_CORE_URL:-http://host.docker.internal:6005}
      PROMPTX_RESOURCE_DIR: ${PROMPTX_RESOURCE_DIR:-/usr/src/external/PromptX/packages/resource}
      AGENCY_AGENTS_DIR: ${AGENCY_AGENTS_DIR:-/usr/src/external/agency-agents}
    volumes:
      - ./apps/backend:/usr/src/app
      - ./apps/frontend:/usr/src/frontend:ro
      - /usr/src/app/node_modules
      - ../PromptX/packages/resource:/usr/src/external/PromptX/packages/resource:ro
      - ../agency-agents:/usr/src/external/agency-agents:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:7010/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
