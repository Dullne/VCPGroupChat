# Only for standalone backend debugging. For the product app stack, run
# docker compose from the VCPGroupChat repository root.
services:
  groupchat-app:
    build: .
    container_name: vcp-groupchat-app
    ports:
      - "7010:7010"
    env_file:
      - path: ./config.env
        required: false
    environment:
      FRONTEND_STATIC_DIR: /usr/src/frontend
    volumes:
      - .:/usr/src/app
      - ../frontend:/usr/src/frontend:ro
      - /usr/src/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:7010/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
