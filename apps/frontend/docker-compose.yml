# Standalone frontend debugging only. The default product stack is the
# repository-root compose file, where the VCPGroupChat product backend serves this frontend
# from the same `groupchat-app` container on port 7010.
services:
  vcpgroupchat-ui-debug:
    image: nginx:alpine
    container_name: vcpgroupchat-ui-debug
    ports:
      - "4090:80"
    volumes:
      - .:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
